{% extends "base.html" %}

{% block css %}

<style>

.container{
max-width:850px;
margin:auto;
padding:40px;
}

.form-card{
background:white;
padding:35px;
border-radius:12px;
border:1px solid #e5eaf3;
box-shadow:0 8px 30px rgba(0,0,0,0.05);
}

h2{
color:#2563eb;
margin-bottom:25px;
}

.form-group{
margin-bottom:18px;
}

label{
display:block;
font-weight:600;
margin-bottom:6px;
font-size:14px;
color:#374151;
}

input,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
transition:0.2s;
}

input:focus,textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

textarea{
height:90px;
resize:none;
}

/* profile image */

.profile-header{
display:flex;
align-items:center;
gap:18px;
margin-bottom:25px;
}

.profile-pic{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:2px solid #e5e7eb;
}

/* skill selector */

.skill-search{
margin-bottom:10px;
}

.skill-results{
border:1px solid #d1d5db;
border-radius:8px;
max-height:160px;
overflow-y:auto;
}

.skill-option{
padding:8px 10px;
cursor:pointer;
font-size:14px;
}

.skill-option:hover{
background:#f1f5f9;
}

/* selected skill tags */

.selected-skills{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-bottom:10px;
}

.skill-tag{
padding:6px 12px;
border-radius:20px;
border:1px solid #22d3ee;
background:#ecfeff;
font-size:13px;
display:flex;
align-items:center;
gap:6px;
}

.skill-tag span{
cursor:pointer;
font-weight:bold;
}

/* button */

button{
margin-top:20px;
background:#2563eb;
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#1d4ed8;
}

</style>

{% endblock %}


{% block content %}

<div class="container">
{% if error %}
<div style="background:#fee2e2;color:#b91c1c;padding:10px;border-radius:6px;margin-bottom:15px;">
  {{ error }}
</div>
{% endif %}
<div class="form-card">

<h2>Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">

<div class="profile-header">

<img id="preview" src="{{user[4] or 'https://i.pravatar.cc/150'}}" class="profile-pic">

<div>
<label>Change Profile Picture</label>
<input type="file" name="profile_pic" accept="image/*" id="profileInput">
</div>

</div>


<div class="form-group">
<label>Full Name</label>
<input type="text" value="{{user[1]}}" disabled>
</div>

<div class="form-group">
<label>Username</label>
<input type="text" value="{{user[2]}}" disabled>
</div>

<div class="form-group">
<label>Email</label>
<input type="text" value="{{user[3]}}" disabled>
</div>

<div class="form-group">
<label>Bio</label>
<textarea name="bio">{{user[5]}}</textarea>
</div>

<div class="form-group">
<label>Date of Birth</label>
<input type="date" name="dob" value="{{user[6]}}">
</div>

<div class="form-group">
<label>Institution</label>
<input type="text" name="institution" value="{{user[7]}}">
</div>

<div class="form-group">
<label>Location</label>
<input type="text" name="location" value="{{user[8]}}">
</div>


<div class="form-group">

<label>Skills</label>

<div class="selected-skills" id="selectedSkills"></div>

<input class="skill-search" type="text" placeholder="Search skills..." id="skillSearch">

<div class="skill-results" id="skillResults"></div>

</div>


<button type="submit">Save Changes</button>

</form>

</div>

</div>

{% endblock %}
{% block js %}

<script>

const allSkills = [
{% for skill in skills %}
{ id: {{skill[0]}}, name: "{{skill[1]}}" },
{% endfor %}
]

let selected = new Set([
{% for s in user_skills %}
{{s}},
{% endfor %}
])

const results = document.getElementById("skillResults")
const search = document.getElementById("skillSearch")
const selectedBox = document.getElementById("selectedSkills")

function renderSelected(){

selectedBox.innerHTML=""

selected.forEach(id=>{

const skill = allSkills.find(s=>s.id==id)

const tag = document.createElement("div")
tag.className="skill-tag"

tag.innerHTML=`${skill.name} <span data-id="${id}">✕</span>`

selectedBox.appendChild(tag)

/* hidden input for flask */

const input = document.createElement("input")
input.type="hidden"
input.name="skills"
input.value=id

selectedBox.appendChild(input)

})

}

/* remove skill */

selectedBox.addEventListener("click",e=>{

if(e.target.tagName==="SPAN"){

const id=parseInt(e.target.dataset.id)
selected.delete(id)

renderSelected()
renderResults(search.value)

}

})

function renderResults(query=""){

results.innerHTML=""

const filtered = allSkills.filter(skill=>

skill.name.toLowerCase().includes(query.toLowerCase())
&& !selected.has(skill.id)

)

filtered.forEach(skill=>{

const div=document.createElement("div")
div.className="skill-option"
div.textContent=skill.name

div.onclick=()=>{

selected.add(skill.id)
renderSelected()
renderResults(search.value)

}

results.appendChild(div)

})

}

search.addEventListener("input",e=>{
renderResults(e.target.value)
})

renderSelected()
renderResults()

/* profile preview */

document.getElementById("profileInput").addEventListener("change",e=>{

const file=e.target.files[0]

if(file){
document.getElementById("preview").src=URL.createObjectURL(file)
}

})

</script>

{% endblock %}
