{% extends 'base.html' %}

{% block css %}
<style>

.container{
max-width:700px;
margin:auto;
padding:40px;
}

.form-card{
background:white;
padding:30px;
border-radius:10px;
border:1px solid #eee;
}

.form-group{
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#111;
color:white;
cursor:pointer;
}

</style>
{% endblock %}

{% block content %}

<div class="container">

<div class="form-card">

<h2>Edit Profile</h2>

<form method="POST">

<div class="form-group">

<label>Bio</label>

<textarea name="bio">{{session.user.bio}}</textarea>

</div>

<button type="submit">Save Changes</button>

</form>

</div>

</div>

{% endblock %}
