{% extends 'base.html' %}

{% block content %}

<div class="feed" id="feedContainer">
    <div class="loading">Loading posts...</div>
</div>

{% endblock %}


{% block js %}

<script>

async function loadFeed(){

const res = await fetch("/api/feed")
const data = await res.json()

const container = document.getElementById("feedContainer")
container.innerHTML = ""

data.posts.forEach(post=>{

container.innerHTML += `
    
<div class="post">

<div class="post-header">

<div class="user">

<img src="${post.profile_pic || '/static/images/user.png'}">

<div>
<h4>${post.full_name}</h4>
<span>@${post.username}</span>
<div class="post-date">${formatDate(post.published_at)}</div>
</div>

</div>

<a href="/profile/${post.student_id}" class="view-profile">
View Profile
</a>

</div>


<img src="${post.image_url}" class="project-img">


<p class="description">
${post.caption || ""}
</p>


<div class="actions">

<button class="like-btn ${post.liked ? 'liked' : ''}" 
onclick="likePost(this, ${post.post_id})">

❤️ <span class="like-count">${post.like_count || 0}</span>

</button>

<button onclick="sharePost('${post.image_url}')">
🔗 Share
</button>

</div>

</div>

`

})

}



async function likePost(btn, postId){

const res = await fetch("/api/post/like",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
post_id:postId
})
})

const data = await res.json()

const countSpan = btn.querySelector(".like-count")
countSpan.innerText = data.like_count

if(data.liked){
btn.classList.add("liked")
}else{
btn.classList.remove("liked")
}

}



function sharePost(url){

navigator.clipboard.writeText(url)
alert("Post link copied!")

}

function formatDate(dateString) {

    const date = new Date(dateString)
    const now = new Date()

    let diff = Math.floor((now - date) / 1000)

    if (diff < 0) diff = 0

    if (diff < 60)
        return (diff || 1) + "s ago"   // prevents 0s

    if (diff < 3600)
        return Math.floor(diff / 60) + "m ago"

    if (diff <= 86400)
        return Math.floor(diff / 3600) + "h ago"

    return Math.floor(diff / 86400) + "d ago"
}



loadFeed()

</script>

{% endblock %}
